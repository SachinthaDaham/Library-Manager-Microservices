name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Microservices
        run: |
          services=("api-gateway" "auth-service" "book-service" "borrow-service" "fine-service" "notification-service" "reservation-service" "frontend")
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build -t dahamsachintha1/$service:${{ github.sha }} ./$service
            docker build -t dahamsachintha1/$service:latest ./$service
            docker push dahamsachintha1/$service:${{ github.sha }}
            docker push dahamsachintha1/$service:latest
            
            # Update the Kubernetes manifest with the new unique image tag (Git SHA)
            sed -i "s|image: dahamsachintha1/$service:.*|image: dahamsachintha1/$service:${{ github.sha }}|g" k8s/$service.yaml
          done

      - name: Commit Updated K8s Manifests (Triggers ArgoCD)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add k8s/
          git commit -m "chore: GitOps update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
