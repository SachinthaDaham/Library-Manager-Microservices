name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Microservices
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          services=("api-gateway" "auth-service" "book-service" "borrow-service" "fine-service" "notification-service" "reservation-service" "frontend")
          for service in "${services[@]}"; do
            echo "Building $service..."
            IMAGE_NAME="ghcr.io/$REPO/$service"
            docker build -t $IMAGE_NAME:${{ github.sha }} ./$service
            docker push $IMAGE_NAME:${{ github.sha }}
            
            # Update the Kubernetes manifest with the new unique image tag
            sed -i "s|image: .*$service:.*|image: $IMAGE_NAME:${{ github.sha }}|g" k8s/$service.yaml
          done

      - name: Commit Updated K8s Manifests (Triggers ArgoCD)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add k8s/
          git commit -m "chore: GitOps update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
