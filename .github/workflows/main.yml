name: Library System AKS CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push All Microservices
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA=${{ github.sha }}
          SERVICES=("api-gateway" "auth-service" "book-service" "borrow-service" "fine-service" "notification-service" "reservation-service" "frontend")
          for SERVICE in "${SERVICES[@]}"; do
            echo "===== Building: $SERVICE ====="
            IMAGE="ghcr.io/${REPO}/${SERVICE}:${SHA}"
            IMAGE_LATEST="ghcr.io/${REPO}/${SERVICE}:latest"
            docker build -t "$IMAGE" -t "$IMAGE_LATEST" "./$SERVICE"
            docker push "$IMAGE"
            docker push "$IMAGE_LATEST"
            sed -i "s|image: .*${SERVICE}:.*|image: ${IMAGE}|g" "k8s/${SERVICE}.yaml"
            echo "Done: $IMAGE"
          done

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: "fe8173f1-971b-447d-8621-62bf5f587001"
          tenant-id: "93ff32a7-6663-47af-aee2-b421dad28886"
          subscription-id: "435e28dc-213d-46d4-b1db-d2c10cde033a"

      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          cluster-name: library-aks
          resource-group: Library-reg
          admin: 'true'

      - name: Create Namespace if Missing
        run: kubectl create namespace library-system --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/
          echo "===== Deployment complete - Pod status ====="
          kubectl get pods -n library-system

