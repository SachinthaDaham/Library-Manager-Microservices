name: Library System AKS CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - book-service
          - borrow-service
          - fine-service
          - notification-service
          - reservation-service
          - frontend
      fail-fast: false

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SERVICE=${{ matrix.service }}
          SHA=${{ github.sha }}
          IMAGE="ghcr.io/${REPO}/${SERVICE}:${SHA}"
          IMAGE_LATEST="ghcr.io/${REPO}/${SERVICE}:latest"

          echo "===== Building: $SERVICE ====="
          docker build --platform linux/arm64 -t "$IMAGE" -t "$IMAGE_LATEST" "./$SERVICE"
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "Done: $IMAGE"

  deploy:
    name: Update Tags & Deploy via ArgoCD
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update K8s Image Tags (GitHub Bot)
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA=${{ github.sha }}
          SERVICES=("api-gateway" "auth-service" "book-service" "borrow-service" "fine-service" "notification-service" "reservation-service" "frontend")
          for SERVICE in "${SERVICES[@]}"; do
            IMAGE="ghcr.io/${REPO}/${SERVICE}:${SHA}"
            MANIFEST="k8s/${SERVICE}/deployment.yaml"
            sed -i "s|image: ghcr.io.*/${SERVICE}:.*|image: ${IMAGE}|g" "$MANIFEST"
            echo "Updated $MANIFEST → $IMAGE"
          done

      - name: Commit Updated Tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --cached --quiet || git commit -m "chore(k8s): update image tags to ${{ github.sha }}"
          git push

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: "fe8173f1-971b-447d-8621-62bf5f587001"
          tenant-id: "93ff32a7-6663-47af-aee2-b421dad28886"
          subscription-id: "435e28dc-213d-46d4-b1db-d2c10cde033a"

      - name: Get AKS Credentials
        uses: azure/aks-set-context@v3
        with:
          cluster-name: library-aks
          resource-group: Library-reg
          admin: 'true'

      - name: Bootstrap ArgoCD (if not present)
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --validate=false
          echo "Waiting for ArgoCD to be ready..."
          kubectl wait --for=condition=available --timeout=120s deployment/argocd-server -n argocd || true

      - name: Apply ArgoCD Root App (App-of-Apps)
        run: |
          kubectl create namespace library-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f argocd/root-app.yaml
          echo "ArgoCD root app applied — auto-sync will deploy all services."

      - name: Show Deployment Status
        run: |
          echo "===== ArgoCD Applications ====="
          kubectl get applications -n argocd || true
          echo "===== Library System Pods ====="
          kubectl get pods -n library-system || true
