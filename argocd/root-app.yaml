apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: library-system-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/SachinthaDaham/Library-Manager-Microservices.git'
    targetRevision: HEAD
    path: 'argocd/apps'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
