apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: library-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: dahamsachintha1/api-gateway:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: library-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: library-system
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
