apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: library-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SachinthaDaham/Library-Manager-Microservices.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true       # Automatically delete resources if removed from Git
      selfHeal: true    # Automatically sync if cluster diverges from Git
