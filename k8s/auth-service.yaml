apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: library-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/auth-service:latest
        ports:
        - containerPort: 3007
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3007"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: library-system
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 3007
      targetPort: 3007
