apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: library-system
  labels:
    app: auth-service
    component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        component: auth
    spec:
      containers:
      - name: auth-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/auth-service:08e3b3371f4be815e45daab8f86a0461efbcd43b
        imagePullPolicy: Always
        ports:
        - containerPort: 3007
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: library-secrets
              key: JWT_SECRET
        - name: PORT
          value: "3007"
        - name: MONGODB_URI
          value: "mongodb+srv://f1admin:DGoSkGXpThvjkv2E@cluster0.gsu8i5s.mongodb.net/library-auth-db?retryWrites=true&w=majority&appName=Cluster0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 3007
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3007
          initialDelaySeconds: 20
          periodSeconds: 30



