apiVersion: v1
kind: Namespace
metadata:
  name: library-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: library-config
  namespace: library-system
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb+srv://admin:admin123@cluster0.mongodb.net/library?retryWrites=true&w=majority"
  RABBITMQ_URL: "amqp://rabbitmq:5672"
  PORT: "3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: library-secrets
  namespace: library-system
type: Opaque
stringData:
  JWT_SECRET: "super_secret_key_12345"
