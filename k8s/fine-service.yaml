apiVersion: apps/v1
kind: Deployment
metadata:
  name: fine-service
  namespace: library-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fine-service
  template:
    metadata:
      labels:
        app: fine-service
    spec:
      containers:
      - name: fine-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/fine-service:latest
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: fine-service
  namespace: library-system
spec:
  selector:
    app: fine-service
  ports:
    - protocol: TCP
      port: 3004
      targetPort: 3004
