apiVersion: apps/v1
kind: Deployment
metadata:
  name: fine-service
  namespace: library-system
  labels:
    app: fine-service
    component: fines
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fine-service
  template:
    metadata:
      labels:
        app: fine-service
        component: fines
    spec:
      containers:
      - name: fine-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/fine-service:514719812ffaa3bbea7e0ecbe112c818b58a9324
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3004"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: library-secrets
              key: JWT_SECRET
        - name: MONGODB_URI
          value: "mongodb+srv://f1admin:DGoSkGXpThvjkv2E@cluster0.gsu8i5s.mongodb.net/library-fine-db?retryWrites=true&w=majority&appName=Cluster0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3004
          initialDelaySeconds: 20
          periodSeconds: 30




