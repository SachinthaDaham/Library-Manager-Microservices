apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: library-system
  labels:
    app: notification-service
    component: notifications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: notifications
    spec:
      containers:
      - name: notification-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/notification-service:d87609cd7c15f4acb72005955b98431d7229b5ea
        imagePullPolicy: Always
        ports:
        - containerPort: 3006
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3006"
        - name: MONGODB_URI
          value: "mongodb+srv://f1admin:DGoSkGXpThvjkv2E@cluster0.gsu8i5s.mongodb.net/library-notification-db?retryWrites=true&w=majority&appName=Cluster0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          tcpSocket:
            port: 3006
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3006
          initialDelaySeconds: 20
          periodSeconds: 30



