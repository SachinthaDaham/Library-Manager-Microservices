apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: library-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
      - name: reservation-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/reservation-service:latest
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3005"
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: library-system
spec:
  selector:
    app: reservation-service
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
