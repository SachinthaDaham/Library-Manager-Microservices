apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: library-system
  labels:
    app: reservation-service
    component: reservations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
        component: reservations
    spec:
      containers:
      - name: reservation-service
        image: ghcr.io/sachinthadaham/library-manager-microservices/reservation-service:4e85605227b56df1441edadb9fcffdc4487fd379
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: library-config
        env:
        - name: PORT
          value: "3005"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 20
          periodSeconds: 30
